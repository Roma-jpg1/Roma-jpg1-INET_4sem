services:
  comms:
    build:
      context: .
      dockerfile: Dockerfile_main
    expose:
      - "8278"

  others:
    build:
      context: .
      dockerfile: Dockerfile_other
    expose:
      - "8279"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - comms
      - others